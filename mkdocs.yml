site_name: Monty Extension Documentation
repo_url: https://github.com/IFRCGo/monty-stac-extension
repo_name: IFRCGo/monty-stac-extension

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [!relative $config_dir]
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - github-callouts

docs_dir: docs
site_dir: site

# Fail `mkdocs build --strict` (see .github/workflows/test.yaml) when a doc
# under docs/ isn't reachable from nav — the nav-coverage guardrail from
# https://github.com/IFRCGo/monty-stac-extension/issues/64. Use `not_in_nav`
# below for pages that are deliberately excluded.
validation:
  nav:
    omitted_files: warn

plugins:
  - search
  - mermaid2

nav:
  - Home: index.md
  - Model:
    - Overview: model/README.md
    - Taxonomy: model/taxonomy.md
    - Response Taxonomy: model/response-taxonomy.md
    - Response Best Practices: model/response-best-practices.md
    - Response ↔ Impact Boundary: model/response-impact-boundary.md
    - Event Correlation: model/correlation_identifier.md
    - Questions: model/questions.md
  - Examples: examples/index.md
  - STAC API:
    - Overview: model/stac-api/README.md
    - Correlation Algorithms: model/stac-api/correlation_algorithms.md
    - Correlation Examples: model/stac-api/correlation_examples.md
    - Migration Guide: model/stac-api/migration_guide.md
    - Queryables: model/stac-api/queryables.md
  - Sources:
    - Overview: model/sources/README.md
    - CEMS: model/sources/CEMS/README.md
    - Charter: model/sources/Charter/README.md
    - DesInventar: model/sources/DesInventar/README.md
    - EM-DAT: model/sources/EM-DAT/README.md
    - GDACS: model/sources/GDACS/README.md
    - GFD: model/sources/GFD/README.md
    - GLIDE: model/sources/GLIDE/README.md
    - IBTrACS: model/sources/IBTrACS/README.md
    - IDMC: model/sources/IDMC/README.md
    - IDU: model/sources/IDU/README.md
    - IFRC-DREF: model/sources/IFRC-DREF/README.md
    - PDC: model/sources/PDC/README.md
    - USGS: model/sources/USGS/README.md

# Docs deliberately excluded from the nav (not a coverage gap):
# working notes, not meant to be published as a site page.
not_in_nav: |
  model/sources/CEMS/FINDINGS.md

extra_css:
  - styles/extra.css
